<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="!loading()"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '26rem' }"
  styleClass="reprocess-dialog"
  header="Confirmar Reproceso"
>
  @if (transaction(); as tx) {
    <div class="flex flex-col gap-4 py-2">
      <div class="flex gap-3 items-start">
        <i class="pi pi-exclamation-triangle text-xl text-amber-500 shrink-0 mt-0.5"></i>
        <p class="text-sm text-secondary-600 leading-relaxed">
          ¿Estás seguro de que deseas volver a procesar esta transacción? Se enviará a la cola de procesamiento actual.
        </p>
      </div>

      <div class="w-full bg-surface-50 border border-surface-200 rounded-lg p-3.5 flex flex-col gap-2 text-sm">
        <div class="flex justify-between">
          <span class="text-secondary-500">ID Externo:</span>
          <span class="font-mono font-semibold text-secondary-800">{{ tx.externalId }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-secondary-500">Sistema Origen:</span>
          <span class="font-semibold text-secondary-800">{{ tx.sourceSystem }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-secondary-500">Tipo:</span>
          <span class="font-semibold text-secondary-800 capitalize">{{ tx.type }}</span>
        </div>
      </div>
    </div>

    <div class="flex gap-3 border-t border-surface-200 pt-4 mt-2">
      <p-button
        label="Cancelar"
        severity="secondary"
        [text]="true"
        class="flex-1"
        styleClass="w-full justify-center"
        [disabled]="loading()"
        (onClick)="onCancel()"
      />
      <p-button
        label="Reprocesar"
        severity="danger"
        class="flex-1"
        styleClass="w-full justify-center"
        [loading]="loading()"
        (onClick)="onConfirm()"
      />
    </div>
  }
</p-dialog>
