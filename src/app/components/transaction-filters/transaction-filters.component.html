<div class="bg-white p-4 rounded-xl border border-surface-200 shadow-sm flex flex-col gap-4">
  <div class="flex items-center justify-between border-b border-surface-100 pb-2">
    <div class="flex items-center gap-2 text-primary-800 font-semibold text-sm">
      <i class="pi pi-filter"></i>
      <span>Filtros de Búsqueda</span>
    </div>
    <p-button
      label="Limpiar Filtros"
      icon="pi pi-filter-slash"
      [text]="true"
      severity="secondary"
      size="small"
      (onClick)="clearFilters()"
    />
  </div>

  <form [formGroup]="form">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 items-end">

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-neutral-600">ID Externo</label>
        <span class="p-inputicon-left w-full">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            placeholder="Buscar..."
            class="w-full text-sm"
            formControlName="searchTerm"
          />
        </span>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-neutral-600">Estado</label>
        <p-select
          [options]="statusOptions"
          formControlName="status"
          optionLabel="label"
          optionValue="value"
          class="w-full text-sm"
          placeholder="Seleccionar Estado"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-neutral-600">Tipo Transacción</label>
        <p-select
          [options]="typeOptions"
          formControlName="type"
          optionLabel="label"
          optionValue="value"
          class="w-full text-sm"
          placeholder="Seleccionar Tipo"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-neutral-600">Sistema Origen</label>
        <p-select
          [options]="sourceOptions"
          formControlName="sourceSystem"
          optionLabel="label"
          optionValue="value"
          class="w-full text-sm"
          placeholder="Seleccionar Sistema"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-neutral-600">Rango de fechas</label>
        <p-datepicker
          formControlName="dates"
          selectionMode="range"
          [readonlyInput]="true"
          placeholder="Seleccionar Rango"
          class="w-full text-sm"
          [showIcon]="true"
        />
      </div>

    </div>
  </form>
</div>
